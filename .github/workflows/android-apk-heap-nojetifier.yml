name: Build Android Debug APK (Heap + No Jetifier)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Pin Async Storage to stable 2.2.0
        run: |
          npm pkg set dependencies."@react-native-async-storage/async-storage"="2.2.0"
          rm -f package-lock.json

      - name: Tune Gradle memory and disable Jetifier
        run: |
          sed -i '/^org.gradle.jvmargs=/d' android/gradle.properties || true
          sed -i '/^android.enableJetifier=/d' android/gradle.properties || true
          sed -i '/^newArchEnabled=/d' android/gradle.properties || true
          printf '\norg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8\n' >> android/gradle.properties
          printf 'android.enableJetifier=false\n' >> android/gradle.properties

      - name: Install npm dependencies
        run: npm install

      - name: Accept licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: quotesnap-debug-apk-heap-nojetifier
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
