name: Build Android APK

on:
  push:
    branches: [ "main", "main1" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace
        env:
          # For a simple release build without signing, you can use these or provide a keystore.
          # For this demo, we'll try to build it.
          MYAPP_RELEASE_STORE_FILE: /dev/null
          MYAPP_RELEASE_KEY_ALIAS: dummy
          MYAPP_RELEASE_STORE_PASSWORD: dummy
          MYAPP_RELEASE_KEY_PASSWORD: dummy

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
